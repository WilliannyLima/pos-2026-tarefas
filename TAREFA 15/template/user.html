{% extends "base.html" %}

{% block title %}Perfil{% endblock %}

{% block content %}

<div class="card shadow p-4 text-center">

    <img src="{{ user_data['url_foto_150x200'] }}"
         class="rounded-circle mx-auto"
         width="150">

    <h2 class="mt-3">{{ user_data['nome_usual'] }}</h2>

    <p>Matrícula: {{ user_data['matricula'] }}</p>

    <p>Email: {{ user_data['email'] }}</p>

</div>

{% endblock %}
